; PlatformIO Projekt fuer den ESP32 Cheap Yellow Display (ESP32-2432S028R)
; mit resistivem Touch (XPT2046) am eigenen SPI-Bus.
;
; Referenz: https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/SETUP.md

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; 921600 bricht mit dem CH340 des CYD ab ("Serial data stream stopped"),
; 460800 laeuft stabil.
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    ; Registry-Version ist veraltet, daher direkt von GitHub (unterstuetzt eigenen SPI-Bus)
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    ; BME680: Temperatur, Luftfeuchte, Luftdruck, Gassensor (Luftqualitaet)
    adafruit/Adafruit BME680 Library @ ^2.0.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BusIO @ ^1.15.0

; TFT_eSPI wird komplett ueber build_flags konfiguriert,
; damit man die Bibliothek selbst nicht anfassen muss.
build_flags =
    ; Solange kein BME680 angeschlossen ist: Fantasiewerte statt Sensor.
    ; Diese Zeile entfernen, sobald der Sensor angeschlossen ist.
    -DSIMULATE_SENSOR=1
    -DUSER_SETUP_LOADED=1
    ; Dieses Board hat die ST7789-Panel-Variante des CYD (am Geraet
    ; ausgetestet): BGR-Farbreihenfolge, keine Inversion. Mit den
    ; ILI9341-Treibern stimmten Farben bzw. Rotation nicht.
    -DST7789_DRIVER=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
