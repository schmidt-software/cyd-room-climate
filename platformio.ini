; PlatformIO project for the ESP32 Cheap Yellow Display (ESP32-2432S028R)
; with a resistive touchscreen (XPT2046) on its own SPI bus.
;
; Reference: https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/SETUP.md

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; 921600 aborts with the CYD's CH340 ("Serial data stream stopped"),
; 460800 works reliably.
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    ; The registry version is outdated, so pull straight from GitHub
    ; (supports a custom SPI bus)
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    ; BME680: temperature, humidity, pressure, gas sensor (air quality)
    adafruit/Adafruit BME680 Library @ ^2.0.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BusIO @ ^1.15.0

; TFT_eSPI is configured entirely via build flags so the library itself
; never needs to be touched.
build_flags =
    ; While no BME680 is attached: fake values instead of the sensor.
    ; Remove this line once the sensor is connected.
    -DSIMULATE_SENSOR=1
    -DUSER_SETUP_LOADED=1
    ; This board is the ST7789 panel variant of the CYD (verified on the
    ; device): BGR color order, no inversion. The ILI9341 drivers produced
    ; wrong colors and/or a rotated image.
    -DST7789_DRIVER=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
